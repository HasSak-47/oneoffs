<!DOCTYPE html>
<html lang="en" class="w-full h-full">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title></title>
        <link href="output.css" rel="stylesheet">
    </head>
    <body class="w-full h-full">
        <header class="bg-darker sm:w-3/4 w-full">
            <h1 class="text-accent"> Random stuff </h1>
        </header>

        <div id="color">
            <input type="color" id="color-beg" value="#000000">
            <input type="color" id="color-end" value="#007654">
            <input type="number" id="color-step" value="5">
            <input type="range" max="1" min="0" step="100" id="color-extra" value="0">

            <button id="color-send" onclick="render_steps()"> ok </button>
            <div id="steps">
            </div>
        </div>
        <div class="square"></div>
    
    </body>
    <script src="color.js"></script>
</html>
